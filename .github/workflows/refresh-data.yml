# .github/workflows/refresh-data.yml
# Nightly FEC data refresh — pulls latest filings and redeploys the site.
#
# Runs at 6:00 AM UTC (2:00 AM ET) daily, after FEC nightly bulk updates.
# Can also be triggered manually.
#
# Requires:
#   - Repository secret FEC_API_KEY (for 1000 req/hr rate limit)

name: Nightly Data Refresh

on:
  schedule:
    - cron: '0 6 * * *'  # 6:00 AM UTC = 2:00 AM ET
  workflow_dispatch:

permissions:
  contents: write   # Needs write to commit updated data
  pages: write
  id-token: write

concurrency:
  group: "data-refresh"
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run FEC data pipeline
        env:
          FEC_API_KEY: ${{ secrets.FEC_API_KEY }}
        run: |
          cd src
          python run.py --fresh

      - name: Copy data to site
        run: |
          [ -L site/data ] && rm site/data
          mkdir -p site/data
          cp output/*.json site/data/

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ site/data/
          if git diff --staged --quiet; then
            echo "No data changes detected"
          else
            git commit -m "chore: nightly FEC data refresh $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: refresh
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
